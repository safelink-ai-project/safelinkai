<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SafeLink AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>SafeLink AI</h1>
        <p>Paste a URL to scan for phishing or malicious activity:</p>

        <input type="text" id="urlInput" placeholder="https://example.com" />
        <button id="scanBtn">Scan URL</button>

        <div id="result" class="hidden">
            <h2>Scan Result</h2>
            <p><strong>Status:</strong> <span id="status"></span></p>
            <p><strong>Risk Score:</strong> <span id="riskScore"></span></p>
            <h3>Heuristic Flags</h3>
            <ul id="heuristicFlags"></ul>
            <h3>Behaviour Flags</h3>
            <ul id="behaviourFlags"></ul>
            <h3>Page Info</h3>
            <p>Title: <span id="pageTitle"></span></p>
            <p>Forms: <span id="formsCount"></span></p>
            <p>Password Fields: <span id="passwordFields"></span></p>
            <p>Scripts: <span id="scriptsCount"></span></p>
            <img id="screenshot" src="" alt="Page Screenshot" />
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
